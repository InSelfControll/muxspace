# Example muxspace workspace config
# Run: muxspace start my-project

name: my-project
project: acme-app          # group workspaces — use `muxspace jump acme-app` to switch

panes:
  - cwd: ~/projects/acme-app
    command: cargo run      # launched inside a PTY pane
  - cwd: ~/projects/acme-app
    command: cargo test --watch

tools:
  # AI coding assistant (CLI) — launched in a PTY pane automatically
  - app: claude
    kind: ai_assistant
    path: ~/projects/acme-app

  # CLI editor — also launched in a PTY pane
  - app: nvim
    kind: cli_editor
    path: ~/projects/acme-app
    args: []

  # GUI IDE — spawned as an external process
  - app: code
    kind: gui_ide
    path: ~/projects/acme-app

browser:
  # Options: default | chrome | chromium | firefox
  kind: chrome
  # Omit `profile` to use the user's default Chrome profile (preserves cookies,
  # extensions, and password manager data automatically).
  # profile: "Work"        # uncomment to use a named profile
  urls:
    - http://localhost:3000
    - http://localhost:8080/api/health
